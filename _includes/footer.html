<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <div class="footer-col-wrapper">
      <div class="footer-col">
        <ul class="contact-list">
          {% if site.name -%}
            <li class="p-name">{{ site.name | escape }}</li>
          {% endif -%}
          {% if site.email -%}
            <li class="u-email">{{ site.email }}</li>
          {%- endif %}
        </ul>
      </div>
    </div>
  </div>
  <div class="wrapper">
  <div class="footer-col-wrapper">
    <div class="footer-col">
      <div class="social-links">
        {%- include social.html -%}
      </div>
    </div>
  </div>

</footer>
